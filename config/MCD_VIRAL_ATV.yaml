common:
  lid_topic: "/livox/lidar"
  imu_topic: "/vn100/imu"
  time_sync_en: false         # ONLY turn on when external time synchronization is really not possible

preprocess:
  lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
  scan_line: 1
  blind: 4
  time_scale: 1e-3

mapping:
  acc_cov:       6.0e-2
  gyr_cov:       5.0e-3
  b_acc_cov:     8.0e-5
  b_gyr_cov:     3.0e-6
  fov_degree:    360
  det_range:     100.0
  extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
  extrinsic_T: [ -0.010514839241742317,   -0.008989784841758377,   0.037356468638334630 ]
  extrinsic_R: [  0.99985813160508060000, -0.0002258196228773494, -0.0168423771687589430,
                  -0.00017111407692153792, -0.9999947058517530000,  0.0032494597148797887,
                  -0.01684302179448474500, -0.0032461167514232880, -0.9998528768488223000]

publish:
  path_publish_en: false
  scan_publish_en: true       # false: close all the point cloud output
  scan_effect_pub_en: true    # true: publish the pointscloud of effect point
  dense_publish_en: false       # false: low down the points number in a global-frame point clouds scan.
  scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

path_save_en: true                 # 保存轨迹，用于精度计算和比较

pcd_save:
  pcd_save_en: true
  interval: 500                 # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

feature_extract_enable: false
point_filter_num: 1
max_iteration: 3
filter_size_surf: 0.2
filter_size_map: 0.2             # 暂时未用到，代码中为0， 即倾向于将降采样后的scan中的所有点加入map
cube_side_length: 1000

ivox_grid_resolution: 0.2        # default=0.2
ivox_nearby_type: 18             # 6, 18, 26
esti_plane_threshold: 0.1        # default=0.1
