common:
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  camera_topic: "/left_camera/image"
  camera_enable: true
  imu_enable: true
  scan_interval: 0.1
  lidar_time_offset: 0
  camera_time_offset: 0
  image_skip: 1
preprocess:
  lidar_type: LIVOX
  blind: 4

mapping:
  acc_cov:       6.0e-2
  gyr_cov:       5.0e-3
  b_acc_cov:     8.0e-5
  b_gyr_cov:     3.0e-6
  fov_degree:    360
  det_range:     100.0
  extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
  extrin_t_il: [0.04165, 0.02326, -0.0284]
  extrin_R_il: [1, 0, 0, 0, 1, 0, 0, 0, 1]

path_save_en: true                 # 保存轨迹，用于精度计算和比较

pcd_save:
  pcd_save_en: true
  interval: 500                 # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

image_save_en: true

feature_extract_enable: false
point_filter_num: 1
max_iteration: 3
scan_filter_size: 0.2
map_filter_size: 0.2             # 暂时未用到，代码中为0， 即倾向于将降采样后的scan中的所有点加入map
cube_side_length: 1000

ivox_grid_resolution: 0.2        # default=0.2
ivox_nearby_type: 18             # 6, 18, 26
esti_plane_threshold: 0.1        # default=0.1

# HIT_Graffiti_Wall_01, HIT_Graffiti_Wall_02, HIT_Graffiti_Wall_03, HIT_Graffiti_Wall_04
# SYSU_01, SYSU_02
cam:
  # pinhole
  # pinhole_radial
  # pinhole_fisheye
  # spherical
  camera_model: pinhole_radial
  distortion_param: [-0.0780830982640722, 0.146382433670493, 0.0, -0.00110111633050301, -0.00110752991013068]
  pinhole_param: [1311.89517127580, 1311.36488586115, 656.523841857393, 504.136322840350]
  resolution: [1280, 1024]
  extrin_t_cl: [0.00549469, 0.0712101, 0.0322054]
  extrin_R_cl: [-0.0036250, -0.9998907, -0.0143360,
                0.0075568,  0.0143083, -0.9998690,
                0.9999649, -0.0037329,  0.0075041]

global:
  lc_enable: false
  loop_weight: 1.0

  ba_enable: false
  ba_iters: 3

  keyframe_dist_threshold: 1.0
  keyframe_angle_threshold: 8.0
  keyframe_time_threshold: 3.0

  output_all_loop_reigster_result: false
  lc_detect_dist_thr: 5.0
  lc_detect_temporal_dist_thr: 30
  sub_map_interval: 5