common:
  lid_topic: "/hesai/pandar"
  imu_topic: "/alphasense/imu"
  camera_topic: "/alphasense/cam0/image_raw"
  camera_enable: false
  scan_interval: 0.1
  lidar_time_offset: 0
  camera_time_offset: 0
  image_skip: 1
preprocess:
  lidar_type: HESAI
  blind: 1

mapping:
  acc_cov: 0.1
  gyr_cov: 0.1
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001
  fov_degree:    360
  det_range:     100.0
  extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
  extrin_t_il: [ -0.001, -0.00855, 0.055 ]
  extrin_R_il: [ 0.7071068, -0.7071068, 0, 0 ]

publish:
  path_publish_en: false
  scan_publish_en: true       # false: close all the point cloud output
  scan_effect_pub_en: true    # true: publish the pointscloud of effect point
  dense_publish_en: false       # false: low down the points number in a global-frame point clouds scan.
  scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

path_save_en: true                 # 保存轨迹，用于精度计算和比较

pcd_save:
  pcd_save_en: true
  interval: 500                 # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
image_save_en: false

feature_extract_enable: false
point_filter_num: 1
max_iteration: 3
scan_filter_size: 0.2
map_filter_size: 0.2             # 暂时未用到，代码中为0， 即倾向于将降采样后的scan中的所有点加入map
cube_side_length: 1000

ivox_grid_resolution: 0.2        # default=0.2
ivox_nearby_type: 18             # 6, 18, 26
esti_plane_threshold: 0.1        # default=0.1
